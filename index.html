<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0c0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>StrataChroma</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #0d0c0a; color: #d4d0c0; min-height: 100vh; }
      #root { min-height: 100vh; }

      /* Splash visible hasta que React monte algo en #root */
      #splash {
        position: fixed; inset: 0; background: #0d0c0a; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; pointer-events: none;
      }
      /* Ocultar splash cuando #root tiene contenido React */
      #root:not(:empty) ~ #splash { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <div style="font-size:22px;font-weight:300;color:#e8e4d4;letter-spacing:.05em;font-family:'Courier New',monospace">
        STRATA<b style="color:#c8a96e">CHROMA</b>
      </div>
      <div style="font-size:10px;color:#666;letter-spacing:.15em;font-family:monospace;text-transform:uppercase">
        Cargando&hellip;
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
